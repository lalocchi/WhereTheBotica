<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhereTheBotica</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="game-container">
    <div id="start-screen" class="screen">
      <h1>WhereTheBotica</h1>
      <p>Help Obotic collect Batberries and rescue Botica.</p>
      <button id="start-btn">Play</button>
    </div>

    <div id="game-screen" class="hidden">
      <div id="hud">
        <span>Level: <span id="level-number">1</span></span>
        <span>Batberries: <span id="score">0</span></span>
        <span>High Score: <span id="high-score">0</span></span>
      </div>

      <div id="game-board"></div>
      <div id="boss-panel" class="hidden">
      <p>Fredge HP: <span id="boss-hp">3</span></p>

      <button onclick="playCard('quick')">Quick Zap - 1 Batberry</button>
      <button onclick="playCard('heavy')">Heavy Hit - 2 Batberries</button>
      <button onclick="playCard('shield')">Battery Shield - 1 Batberry</button>
    </div>
    </div>

    <div id="game-over-screen" class="screen hidden">
      <h2 id="end-title">Game Over</h2>
      <p id="end-message"></p>
      <button id="restart-btn">Restart</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
